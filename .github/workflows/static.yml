# Build, security checks, and deploy Astro site to GitHub Pages
name: Build, Security & Deploy

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review dependency changes on PRs
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Scan for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          skip-dirs: dist,.git
          format: table

  tag:
    name: Create release tag
    needs: security
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push semver tag
        id: release
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
          else
            VERSION=$(printf '%s\n' "$LATEST" | sed 's/^v//' | awk -F. '{OFS="."; $NF+=1; print}')
          fi
          NEW_TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}" "${GITHUB_SHA}"
          git push origin "$NEW_TAG"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to GitHub Pages
    needs: [security, tag]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: 1
          PUBLIC_SITE_VERSION: ${{ needs.tag.outputs.version }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
